name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  SCHEME: AITranslator
  PROJECT: AITranslator.xcodeproj
  PRODUCT_NAME: AITranslator

jobs:
  build-and-release:
    name: Build & Create Release
    runs-on: macos-15
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show build environment
        run: |
          xcodebuild -version
          xcodebuild -showsdks | grep macosx
          echo "Tag: ${{ github.ref_name }}"

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          
          # Update Info.plist version numbers
          PLIST_PATH="${{ env.PRODUCT_NAME }}/${{ env.PRODUCT_NAME }}/Info.plist"
          if [ -f "$PLIST_PATH" ]; then
            /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" "$PLIST_PATH" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ github.run_number }}" "$PLIST_PATH" 2>/dev/null || true
          fi

      - name: Build for Release
        run: |
          xcodebuild \
            -project "${{ env.PROJECT }}" \
            -scheme "${{ env.SCHEME }}" \
            -configuration Release \
            -derivedDataPath build \
            -arch arm64 -arch x86_64 \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            MACOSX_DEPLOYMENT_TARGET=15.4 \
            MARKETING_VERSION="${{ env.VERSION }}" \
            CURRENT_PROJECT_VERSION="${{ github.run_number }}" \
            build

      - name: Package .app into DMG
        run: |
          APP_PATH="build/Build/Products/Release/${{ env.PRODUCT_NAME }}.app"
          DMG_NAME="${{ env.PRODUCT_NAME }}-${{ env.VERSION }}-universal.dmg"
          
          # Verify app exists
          if [ ! -d "$APP_PATH" ]; then
            echo "Error: App not found at $APP_PATH"
            find build -name "*.app" -type d
            exit 1
          fi
          
          echo "App found at: $APP_PATH"
          echo "App size: $(du -sh "$APP_PATH" | cut -f1)"
          
          # Create a temporary DMG folder
          mkdir -p dmg_contents
          cp -R "$APP_PATH" dmg_contents/
          
          # Create a symlink to Applications
          ln -s /Applications dmg_contents/Applications
          
          # Create DMG
          hdiutil create \
            -volname "${{ env.PRODUCT_NAME }}" \
            -srcfolder dmg_contents \
            -ov \
            -format UDZO \
            "$DMG_NAME"
          
          echo "DMG_NAME=$DMG_NAME" >> $GITHUB_ENV
          echo "DMG created: $DMG_NAME ($(du -sh "$DMG_NAME" | cut -f1))"

      - name: Package .app into ZIP
        run: |
          APP_PATH="build/Build/Products/Release/${{ env.PRODUCT_NAME }}.app"
          ZIP_NAME="${{ env.PRODUCT_NAME }}-${{ env.VERSION }}-universal.zip"
          
          cd build/Build/Products/Release
          zip -r -y "../../../../$ZIP_NAME" "${{ env.PRODUCT_NAME }}.app"
          cd ../../../..
          
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV
          echo "ZIP created: $ZIP_NAME ($(du -sh "$ZIP_NAME" | cut -f1))"

      - name: Generate Release Notes
        id: release_notes
        run: |
          TAG="${{ github.ref_name }}"
          PREV_TAG=$(git tag --sort=-creatordate | grep -A1 "^$TAG$" | tail -1)
          
          if [ "$PREV_TAG" != "$TAG" ] && [ -n "$PREV_TAG" ]; then
            CHANGES=$(git log --pretty=format:"- %s" "$PREV_TAG..$TAG" --no-merges)
          else
            CHANGES=$(git log --pretty=format:"- %s" -20 --no-merges)
          fi
          
          # Write release notes
          cat > release_notes.md << EOF
          ## What's New in $TAG
          
          $CHANGES
          
          ---
          
          ### Installation
          
          1. Download \`${{ env.DMG_NAME }}\` (recommended) or \`${{ env.ZIP_NAME }}\`
          2. Open the DMG and drag **AI Translator** to your Applications folder
          3. Launch the app, go to **Settings**, and enter your API key
          4. Start translating! 🌐
          
          ### System Requirements
          - macOS 15.4 or later
          - Apple Silicon or Intel Mac (Universal Binary)
          
          ### Supported Providers
          - OpenAI (GPT-4o, GPT-4.1, etc.)
          - Anthropic (Claude Sonnet 4, Claude 3.7, etc.)
          - Google Gemini (Gemini 2.5, 2.0, etc.)
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "AI Translator ${{ github.ref_name }}"
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') || contains(github.ref_name, '-alpha') }}
          files: |
            ${{ env.DMG_NAME }}
            ${{ env.ZIP_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
